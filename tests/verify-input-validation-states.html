<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation States Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom CSS for validation states */
        .border-destructive-500 { border-color: rgb(239 68 68); }
        .border-success-500 { border-color: rgb(16 185 129); }
        .text-destructive-600 { color: rgb(220 38 38); }
        .text-success-600 { color: rgb(5 150 105); }
        .animate-fade-in { animation: fadeIn 0.2s ease-in-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .transition-all { transition: all 0.2s ease-smooth; }
        .ease-smooth { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Input Validation States Verification</h1>
        
        <!-- Default State -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Default State</label>
            <input 
                type="text" 
                placeholder="Enter text..."
                class="flex w-full rounded-md border border-gray-300 hover:border-gray-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 bg-white text-sm h-12 px-4 py-3 transition-all duration-200 ease-smooth focus:outline-none disabled:cursor-not-allowed disabled:opacity-50"
            />
        </div>
        
        <!-- Error State -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Error State</label>
            <input 
                type="text" 
                placeholder="Enter text..."
                class="flex w-full rounded-md border border-destructive-500 focus:border-red-600 focus:ring-2 focus:ring-red-500/20 bg-white text-sm h-12 px-4 py-3 transition-all duration-200 ease-smooth focus:outline-none disabled:cursor-not-allowed disabled:opacity-50"
                aria-invalid="true"
                aria-describedby="error-message"
            />
            <p id="error-message" class="mt-1.5 text-sm text-destructive-600 flex items-center gap-1.5 animate-fade-in" role="alert">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                </svg>
                This field is required
            </p>
        </div>
        
        <!-- Success State -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Success State</label>
            <input 
                type="text" 
                placeholder="Enter text..."
                value="Valid input"
                class="flex w-full rounded-md border border-success-500 focus:border-green-600 focus:ring-2 focus:ring-green-500/20 bg-white text-sm h-12 px-4 py-3 transition-all duration-200 ease-smooth focus:outline-none disabled:cursor-not-allowed disabled:opacity-50"
                aria-describedby="success-message"
            />
            <p id="success-message" class="mt-1.5 text-sm text-success-600 flex items-center gap-1.5 animate-fade-in">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                </svg>
                Valid input
            </p>
        </div>
        
        <!-- Interactive Demo -->
        <div class="space-y-4 p-6 bg-white rounded-lg shadow-sm border">
            <h2 class="text-xl font-semibold text-gray-900">Interactive Demo</h2>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Test Input (type to see validation)</label>
                <input 
                    id="demo-input"
                    type="text" 
                    placeholder="Type 'error' or 'success' to see states..."
                    class="flex w-full rounded-md border border-gray-300 hover:border-gray-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 bg-white text-sm h-12 px-4 py-3 transition-all duration-200 ease-smooth focus:outline-none disabled:cursor-not-allowed disabled:opacity-50"
                />
                <div id="demo-message" class="min-h-[24px]"></div>
            </div>
            
            <div class="space-y-2">
                <h3 class="text-lg font-medium text-gray-800">Validation Tests</h3>
                <div id="test-results" class="space-y-2"></div>
                <button 
                    onclick="runValidationTests()"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
                >
                    Run Validation Tests
                </button>
            </div>
        </div>
    </div>

    <script>
        // Interactive demo functionality
        const demoInput = document.getElementById('demo-input');
        const demoMessage = document.getElementById('demo-message');
        
        demoInput.addEventListener('input', function() {
            const value = this.value.toLowerCase();
            
            // Reset classes
            this.className = 'flex w-full rounded-md border bg-white text-sm h-12 px-4 py-3 transition-all duration-200 ease-smooth focus:outline-none disabled:cursor-not-allowed disabled:opacity-50';
            this.removeAttribute('aria-invalid');
            this.removeAttribute('aria-describedby');
            
            if (value.includes('error')) {
                // Apply error state
                this.className += ' border-destructive-500 focus:border-red-600 focus:ring-2 focus:ring-red-500/20';
                this.setAttribute('aria-invalid', 'true');
                this.setAttribute('aria-describedby', 'demo-error');
                
                demoMessage.innerHTML = `
                    <p id="demo-error" class="text-sm text-destructive-600 flex items-center gap-1.5 animate-fade-in" role="alert">
                        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                        </svg>
                        Error: Invalid input detected
                    </p>
                `;
            } else if (value.includes('success')) {
                // Apply success state
                this.className += ' border-success-500 focus:border-green-600 focus:ring-2 focus:ring-green-500/20';
                this.setAttribute('aria-describedby', 'demo-success');
                
                demoMessage.innerHTML = `
                    <p id="demo-success" class="text-sm text-success-600 flex items-center gap-1.5 animate-fade-in">
                        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                        </svg>
                        Success: Valid input
                    </p>
                `;
            } else {
                // Default state
                this.className += ' border-gray-300 hover:border-gray-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20';
                demoMessage.innerHTML = '';
            }
        });
        
        // Validation tests
        function runValidationTests() {
            const results = document.getElementById('test-results');
            const tests = [];
            
            // Test 1: Error state border color
            const errorInput = document.createElement('input');
            errorInput.className = 'border-destructive-500';
            document.body.appendChild(errorInput);
            const errorStyle = window.getComputedStyle(errorInput);
            const hasRedBorder = errorStyle.borderColor.includes('239') || errorStyle.borderColor.includes('rgb(239, 68, 68)');
            tests.push({
                name: 'Error state has red border',
                passed: hasRedBorder,
                details: `Border color: ${errorStyle.borderColor}`
            });
            document.body.removeChild(errorInput);
            
            // Test 2: Success state border color
            const successInput = document.createElement('input');
            successInput.className = 'border-success-500';
            document.body.appendChild(successInput);
            const successStyle = window.getComputedStyle(successInput);
            const hasGreenBorder = successStyle.borderColor.includes('16') || successStyle.borderColor.includes('rgb(16, 185, 129)');
            tests.push({
                name: 'Success state has green border',
                passed: hasGreenBorder,
                details: `Border color: ${successStyle.borderColor}`
            });
            document.body.removeChild(successInput);
            
            // Test 3: Error message color
            const errorMsg = document.createElement('p');
            errorMsg.className = 'text-destructive-600';
            errorMsg.textContent = 'Test';
            document.body.appendChild(errorMsg);
            const errorMsgStyle = window.getComputedStyle(errorMsg);
            const hasRedText = errorMsgStyle.color.includes('220') || errorMsgStyle.color.includes('rgb(220, 38, 38)');
            tests.push({
                name: 'Error message has red text',
                passed: hasRedText,
                details: `Text color: ${errorMsgStyle.color}`
            });
            document.body.removeChild(errorMsg);
            
            // Test 4: Success message color
            const successMsg = document.createElement('p');
            successMsg.className = 'text-success-600';
            successMsg.textContent = 'Test';
            document.body.appendChild(successMsg);
            const successMsgStyle = window.getComputedStyle(successMsg);
            const hasGreenText = successMsgStyle.color.includes('5') || successMsgStyle.color.includes('rgb(5, 150, 105)');
            tests.push({
                name: 'Success message has green text',
                passed: hasGreenText,
                details: `Text color: ${successMsgStyle.color}`
            });
            document.body.removeChild(successMsg);
            
            // Test 5: ARIA attributes
            const testInput = document.querySelector('input[aria-invalid="true"]');
            const hasAriaInvalid = testInput && testInput.getAttribute('aria-invalid') === 'true';
            const hasAriaDescribedBy = testInput && testInput.hasAttribute('aria-describedby');
            tests.push({
                name: 'Error inputs have proper ARIA attributes',
                passed: hasAriaInvalid && hasAriaDescribedBy,
                details: `aria-invalid: ${hasAriaInvalid}, aria-describedby: ${hasAriaDescribedBy}`
            });
            
            // Test 6: Role alert on error messages
            const alertElement = document.querySelector('[role="alert"]');
            const hasAlertRole = !!alertElement;
            tests.push({
                name: 'Error messages have role="alert"',
                passed: hasAlertRole,
                details: `Alert element found: ${hasAlertRole}`
            });
            
            // Display results
            const passedTests = tests.filter(t => t.passed).length;
            const totalTests = tests.length;
            
            results.innerHTML = `
                <div class="p-4 rounded-lg ${passedTests === totalTests ? 'bg-green-50 border border-green-200' : 'bg-yellow-50 border border-yellow-200'}">
                    <h4 class="font-semibold ${passedTests === totalTests ? 'text-green-800' : 'text-yellow-800'} mb-2">
                        Test Results: ${passedTests}/${totalTests} passed
                    </h4>
                    <div class="space-y-1 text-sm">
                        ${tests.map(test => `
                            <div class="flex items-center gap-2">
                                <span class="${test.passed ? 'text-green-600' : 'text-red-600'}">
                                    ${test.passed ? '✓' : '✗'}
                                </span>
                                <span class="font-medium">${test.name}</span>
                                <span class="text-gray-600">- ${test.details}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        // Run tests on page load
        window.addEventListener('load', runValidationTests);
    </script>
</body>
</html>
