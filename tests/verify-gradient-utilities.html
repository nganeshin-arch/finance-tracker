<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Utilities Verification</title>
  <style>
    /* Simulate CSS custom properties */
    :root {
      --gradient-primary: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%);
      --gradient-accent: linear-gradient(135deg, #d946ef 0%, #c026d3 50%, #a21caf 100%);
      --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
      --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
      --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
      --gradient-info: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      --gradient-premium: linear-gradient(135deg, #0ea5e9 0%, #d946ef 50%, #f59e0b 100%);
      --gradient-income: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
      --gradient-expense: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
      --gradient-neutral: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
    }
    
    [data-theme="dark"] {
      --gradient-primary: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 50%, #0284c7 100%);
      --gradient-accent: linear-gradient(135deg, #e879f9 0%, #d946ef 50%, #c026d3 100%);
      --gradient-success: linear-gradient(135deg, #34d399 0%, #10b981 50%, #059669 100%);
      --gradient-danger: linear-gradient(135deg, #f87171 0%, #ef4444 50%, #dc2626 100%);
      --gradient-warning: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
      --gradient-info: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);
      --gradient-premium: linear-gradient(135deg, #38bdf8 0%, #e879f9 50%, #fbbf24 100%);
      --gradient-income: linear-gradient(135deg, #4ade80 0%, #22c55e 50%, #16a34a 100%);
      --gradient-expense: linear-gradient(135deg, #f87171 0%, #ef4444 50%, #dc2626 100%);
      --gradient-neutral: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      background: #f9fafb;
    }
    
    [data-theme="dark"] body {
      background: #111827;
      color: #f9fafb;
    }
    
    .gradient-box {
      width: 200px;
      height: 120px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      margin: 1rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .bg-gradient-primary { background-image: var(--gradient-primary); }
    .bg-gradient-accent { background-image: var(--gradient-accent); }
    .bg-gradient-success { background-image: var(--gradient-success); }
    .bg-gradient-danger { background-image: var(--gradient-danger); }
    .bg-gradient-warning { background-image: var(--gradient-warning); }
    .bg-gradient-info { background-image: var(--gradient-info); }
    .bg-gradient-premium { background-image: var(--gradient-premium); }
    .bg-gradient-income { background-image: var(--gradient-income); }
    .bg-gradient-expense { background-image: var(--gradient-expense); }
    .bg-gradient-neutral { background-image: var(--gradient-neutral); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      max-width: 1200px;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    
    button {
      padding: 0.5rem 1rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h1>Premium Gradient Utilities Verification</h1>
  <button onclick="toggleTheme()">Toggle Dark Mode</button>
  
  <div class="grid">
    <div class="gradient-box bg-gradient-primary">Primary</div>
    <div class="gradient-box bg-gradient-accent">Accent</div>
    <div class="gradient-box bg-gradient-success">Success</div>
    <div class="gradient-box bg-gradient-danger">Danger</div>
    <div class="gradient-box bg-gradient-warning">Warning</div>
    <div class="gradient-box bg-gradient-info">Info</div>
    <div class="gradient-box bg-gradient-premium">Premium</div>
    <div class="gradient-box bg-gradient-income">Income</div>
    <div class="gradient-box bg-gradient-expense">Expense</div>
    <div class="gradient-box bg-gradient-neutral">Neutral</div>
  </div>
  
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      html.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
